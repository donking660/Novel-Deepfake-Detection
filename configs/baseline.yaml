# ============================================================================
# Baseline 配置 (合并自 base.yaml + exp_df40_style.yaml)
# 
# 与 DF40 基准保持一致的设计:
#   - 不使用 CLIP 投影层，直接使用 1024 维 CLS token
#   - 使用简单的线性分类头 Linear(1024, 2)
# 
# 使用方法:
#   python tools/train.py --config configs/baseline.yaml
# ============================================================================

# ======================== 实验信息 ========================
experiment:
  name: df40_style
  description: "DF40 Style: 1024-dim CLS token (no proj) + Linear classifier"

# ======================== 数据配置 ========================
data:
  # 数据集根目录
  data_root: /data/zhanzhijie/DATASETS_POOL/deepfakes_detection_datasets
  # 训练集配置文件
  train_json: /data/zhanzhijie/WORKSPACE_CODE/training_dataset_config.json
  # 验证集配置文件 (null 表示使用 train_json)
  val_json: null
  # 输入图像分辨率 (CLIP ViT-L/14 需要 224)
  resolution: 224
  # 数据加载线程数
  num_workers: 4
  # 数据平衡模式: 'dynamic' | 'static' | 'none'
  balance_mode: dynamic

# ======================== 数据增强配置 ========================
data_aug:
  # 水平翻转概率
  flip_prob: 0.5
  # 旋转概率
  rotate_prob: 0.5
  # 旋转角度范围
  rotate_limit: [-10, 10]
  # 模糊概率
  blur_prob: 0.5
  # 模糊核大小范围
  blur_limit: [3, 7]
  # 亮度调整范围
  brightness_limit: [-0.1, 0.1]
  # 对比度调整范围
  contrast_limit: [-0.1, 0.1]
  # JPEG 压缩质量范围
  quality_lower: 40
  quality_upper: 100

# ======================== 模型配置 ========================
# DF40 风格: 不使用 CLIP 投影层，输出 1024 维 CLS token + Linear(1024, 2) 分类头
model:
  # Backbone 类型
  backbone: clip_vit_l14
  
  # 适配器配置
  adapter:
    # 插入适配器的层索引 (ViT-L/14 共24层, 索引0-23)
    layers: [2, 5, 8, 11, 14, 17, 20, 23]
    # 瓶颈层维度
    bottleneck_dim: 128
    # Dropout 概率
    dropout: 0.2
    # 初始 scale 值
    init_scale: 0.05

# ======================== 训练配置 ========================
train:
  # 批量大小
  batch_size: 96
  # 最大训练轮数
  epochs: 100
  # Warmup 轮数
  warmup_epochs: 5
  # Early Stopping 容忍轮数
  patience: 10
  # Checkpoint 保存频率
  save_freq: 10
  # 随机种子
  seed: 42

# ======================== 优化器配置 ========================
optimizer:
  # 优化器类型: 'adamw' | 'adam' | 'sgd'
  type: adamw
  # 初始学习率
  lr: 3.0e-5
  # 权重衰减
  weight_decay: 0.01
  # Label Smoothing
  label_smoothing: 0.1

# ======================== EMA 配置 ========================
ema:
  # 是否启用 EMA
  enabled: true
  # EMA 衰减系数
  decay: 0.999

# ======================== 输出配置 ========================
output:
  # 模型保存目录
  save_dir: checkpoints/df40_style
  # 日志保存目录
  log_dir: logs/df40_style

# ======================== 设备配置 ========================
# GPU ID
device: 0

# ======================== WandB 配置 ========================
wandb:
  # 是否启用 (可通过命令行 --use_wandb 覆盖)
  enabled: false
  # 项目名称
  project: deepfake-detection

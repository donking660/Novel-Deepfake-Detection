data:
  balance_mode: dynamic
  data_root: /data/zhanzhijie/DATASETS_POOL/deepfakes_detection_datasets
  num_workers: 4
  resolution: 224
  train_json: /data/zhanzhijie/WORKSPACE_CODE/training_dataset_config.json
  val_json: null
data_aug:
  blur_limit:
  - 3
  - 7
  blur_prob: 0.5
  brightness_limit:
  - -0.1
  - 0.1
  contrast_limit:
  - -0.1
  - 0.1
  flip_prob: 0.5
  quality_lower: 40
  quality_upper: 100
  rotate_limit:
  - -10
  - 10
  rotate_prob: 0.5
device: 4
ema:
  decay: 0.999
  enabled: true
experiment:
  description: 'DF40 Style: 1024-dim CLS token (no proj) + Linear classifier'
  name: df40_style
model:
  adapter:
    bottleneck_dim: 128
    dropout: 0.2
    init_scale: 0.06
    layers:
    - 2
    - 5
    - 8
    - 11
    - 14
    - 17
    - 20
    - 23
  backbone: clip_vit_l14
  classifier:
    dropout: 0.5
    hidden_dim: 256
  classifier_type: linear
  use_proj: false
optimizer:
  label_smoothing: 0.1
  lr: 3.0e-05
  type: adamw
  weight_decay: 0.01
output:
  log_dir: logs/df40_style
  save_dir: checkpoints/df40_style
train:
  batch_size: 32
  epochs: 100
  patience: 10
  save_freq: 10
  seed: 42
  warmup_epochs: 5
wandb:
  enabled: false
  project: deepfake-detection
